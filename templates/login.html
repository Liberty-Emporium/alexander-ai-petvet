<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Pet Vet AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%); min-height: 100vh; color: #fff; display: flex; align-items: center; justify-content: center; }
        .container { width: 100%; max-width: 400px; padding: 2rem; }
        .card { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 2rem; backdrop-filter: blur(10px); }
        h1 { text-align: center; margin-bottom: 1.5rem; font-size: 1.8rem; }
        h1 span { color: #10b981; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        input { width: 100%; padding: 0.8rem; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; font-size: 1rem; }
        input::placeholder { color: #64748b; }
        .btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 1rem; }
        .btn:hover { transform: translateY(-2px); }
        .link { text-align: center; margin-top: 1rem; color: #94a3b8; }
        .link a { color: #10b981; text-decoration: none; }
        .error { background: rgba(239,68,68,0.2); border: 1px solid #dc2626; border-radius: 8px; padding: 0.75rem; margin-bottom: 1rem; color: #fca5a5; }
        .success { background: rgba(16,185,129,0.2); border: 1px solid #10b981; border-radius: 8px; padding: 0.75rem; margin-bottom: 1rem; color: #6ee7b7; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Pet<span>Vet</span> AI</h1>
            <p style="text-align:center; color:#94a3b8; margin-bottom:1.5rem;">Sign in to your account</p>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                    <div class="{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form method="POST">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn">🔑 Login</button>
            </form>
            
            <p class="link">Don't have an account? <a href="{{ url_for('register') }}">Register</a></p>
            <p class="link"><a href="{{ url_for('index') }}">← Back to Home</a></p>
        </div>
    </div>
</body>
</html>
