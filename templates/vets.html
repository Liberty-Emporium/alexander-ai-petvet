<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Vet AI - Find a Vet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #fff; }
        .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
        header { text-align: center; padding: 2rem 0; }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .subtitle { color: #94a3b8; }
        .search-box { margin: 2rem 0; }
        .search-box input { width: 100%; padding: 1rem; border-radius: 12px; border: 2px solid #3b82f6; background: #1e293b; color: #fff; font-size: 1rem; }
        .filters { display: flex; gap: 1rem; flex-wrap: wrap; margin: 1rem 0; }
        .filter-btn { padding: 0.5rem 1rem; border-radius: 20px; border: 1px solid #3b82f6; background: transparent; color: #3b82f6; cursor: pointer; transition: all 0.3s; }
        .filter-btn.active { background: #3b82f6; color: #fff; }
        .vet-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
        .vet-card { background: #1e293b; border-radius: 16px; padding: 1.5rem; border: 1px solid #334155; }
        .vet-card h3 { color: #3b82f6; margin-bottom: 0.5rem; }
        .vet-card .specialty { display: inline-block; background: #7c3aed; padding: 0.25rem 0.75rem; border-radius: 12px; font-size: 0.8rem; margin: 0.5rem 0; }
        .vet-card .location { color: #94a3b8; margin: 0.5rem 0; }
        .vet-card .phone { color: #22c55e; }
        .vet-card .emergency { color: #ef4444; font-weight: bold; }
        .back-link { display: inline-block; margin-top: 2rem; color: #3b82f6; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏥 Find a Vet</h1>
            <p class="subtitle">Veterinary services in Greensboro, NC</p>
        </header>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search by name, location, or specialty..." onkeyup="filterVets()">
        </div>
        
        <div class="filters">
            <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
            <button class="filter-btn" onclick="setFilter('emergency', this)">🚨 Emergency</button>
            <button class="filter-btn" onclick="setFilter('general', this)">General Practice</button>
            <button class="filter-btn" onclick="setFilter('specialist', this)">🏥 Specialists</button>
        </div>
        
        <div class="vet-grid" id="vetGrid">
            <!-- Vets will be populated here -->
        </div>
        
        <a href="/pets" class="back-link">← Back to My Pets</a>
    </div>
    
    <script>
        const vets = [
            {
                name: "Carolina Veterinary Specialists",
                specialty: "Emergency & Specialist",
                location: "501 Nicholas Rd, Greensboro, NC 27409",
                phone: "(336) 632-0605",
                emergency: true,
                description: "24/7 emergency care + board-certified specialists in surgery, oncology, radiology, ophthalmology & internal medicine. Open 7 days a week."
            },
            {
                name: "Happy Tails Veterinary Emergency Clinic",
                specialty: "Emergency",
                location: "4525 Lawndale Dr, Greensboro, NC 27455",
                phone: "(336) 288-2688",
                emergency: true,
                description: "AAHA-accredited emergency clinic. Weeknights 6pm–8am, weekends & holidays 24 hours. In-house lab, X-ray, ultrasound & laser therapy."
            },
            {
                name: "After Hours Veterinary Emergency Clinic",
                specialty: "Emergency",
                location: "5505 W Friendly Ave, Greensboro, NC 27410",
                phone: "(336) 851-1990",
                emergency: true,
                description: "24/7 walk-in emergency care. Partners with Guilford College Animal Hospital for seamless day-to-night continuity of care."
            },
            {
                name: "Gate City Animal Hospital",
                specialty: "General Practice",
                location: "202 Pisgah Church Rd, Greensboro, NC 27455",
                phone: "(336) 286-9500",
                emergency: false,
                description: "Full-service general practice. Mon–Fri 7:30am–6pm, Sat 8am–12pm."
            },
            {
                name: "Downtown Greensboro Animal Hospital",
                specialty: "General Practice",
                location: "102 W Smith St, Greensboro, NC 27401",
                phone: "(336) 338-1840",
                emergency: false,
                description: "Full-service animal hospital accepting routine and emergency cases. Conveniently located downtown."
            },
            {
                name: "Guilford-Jamestown Veterinary Hospital",
                specialty: "General Practice",
                location: "720 Guilford College Rd, Greensboro, NC 27409",
                phone: "(336) 852-0200",
                emergency: false,
                description: "Trusted general practice serving cats and dogs in Greensboro. Mon–Fri 7:30am–5:30pm, Sat 8am–12pm."
            },
            {
                name: "Lawndale Veterinary Hospital",
                specialty: "General Practice",
                location: "2641 Lawndale Dr, Greensboro, NC 27408",
                phone: "(336) 288-3233",
                emergency: false,
                description: "Full-service veterinary hospital. Mon–Fri 7am–6pm, Sat 7:30am–12pm."
            },
            {
                name: "Benessere Animal Hospital",
                specialty: "General Practice",
                location: "1052 Grecade St, Greensboro, NC 27408",
                phone: "(336) 897-1505",
                emergency: false,
                description: "Offering the very best in veterinary care with a focus on wellness and preventive medicine."
            },
            {
                name: "Adams Farm Animal Hospital",
                specialty: "General Practice",
                location: "Greensboro, NC 27407",
                phone: "(336) 854-5980",
                emergency: false,
                description: "Comprehensive veterinary care including wellness exams, vaccinations, surgery, and dental care."
            },
            {
                name: "Bel-Aire Veterinary Hospital",
                specialty: "General Practice",
                location: "Greensboro, NC 27409",
                phone: "(336) 665-1286",
                emergency: false,
                description: "34+ years serving Greensboro pets. Full-service care including boarding. Mon–Fri 7:30am–5:30pm, Sat 7:30am–12pm."
            },
            {
                name: "Banfield Pet Hospital",
                specialty: "General Practice",
                location: "2641 Lawndale Dr, Greensboro, NC 27408",
                phone: "(336) 545-8333",
                emergency: false,
                description: "Wellness plans, routine care, vaccinations and preventive medicine. Located inside PetSmart."
            },
            {
                name: "Northeast Veterinary Hospital",
                specialty: "General Practice",
                location: "4601 Hicone Rd, Greensboro, NC 27405",
                phone: "(336) 375-0277",
                emergency: false,
                description: "Full-service veterinary hospital serving northeast Greensboro and surrounding areas."
            },
            {
                name: "Piedmont Community Spay & Neuter",
                specialty: "Spay & Neuter",
                location: "Greensboro, NC 27405",
                phone: "(336) 333-5336",
                emergency: false,
                description: "Low-cost spay and neuter services for dogs and cats. Helping control pet overpopulation in the Triad."
            },
            {
                name: "ASPCA Animal Poison Control",
                specialty: "Poison Control",
                location: "National Hotline",
                phone: "(888) 426-4435",
                emergency: true,
                description: "24/7 poison control hotline for pet emergencies. Call immediately if your pet ingests something toxic. Consultation fee may apply."
            }
        ];
        
        let currentFilter = 'all';
        
        function renderVets(filter = 'all', search = '') {
            const grid = document.getElementById('vetGrid');
            let filtered = vets;
            
            if (filter !== 'all') {
                if (filter === 'emergency') {
                    filtered = filtered.filter(v => v.emergency);
                } else if (filter === 'specialist') {
                    filtered = filtered.filter(v => ['specialist', 'Dental', 'Oncology', 'Exotic'].includes(v.specialty));
                }
            }
            
            if (search) {
                filtered = filtered.filter(v => 
                    v.name.toLowerCase().includes(search.toLowerCase()) ||
                    v.location.toLowerCase().includes(search.toLowerCase())
                );
            }
            
            grid.innerHTML = filtered.map(vet => `
                <div class="vet-card">
                    <h3>${vet.name}</h3>
                    <span class="specialty">${vet.specialty}</span>
                    <p class="location">📍 ${vet.location}</p>
                    <p>${vet.description}</p>
                    <p class="phone">📞 ${vet.phone}</p>
                    ${vet.emergency ? '<p class="emergency">🚨 24/7 Emergency</p>' : ''}
                </div>
            `).join('');
        }
        
        function setFilter(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderVets(filter, document.getElementById('searchInput').value);
        }
        
        function filterVets() {
            renderVets(currentFilter, document.getElementById('searchInput').value);
        }
        
        renderVets();
    </script>
</body>
</html>
