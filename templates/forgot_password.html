<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Pet Vet AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
    html,body{overflow-x:hidden!important;max-width:100%;}
    img{max-width:100%;height:auto;}
    @media(max-width:768px){table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;}input,select,textarea{font-size:16px!important;}}

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%); min-height: 100vh; color: #fff; display: flex; align-items: center; justify-content: center; }
        .container { width: 100%; max-width: 400px; padding: 2rem; }
        .card { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 2rem; backdrop-filter: blur(10px); }
        h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; }
        h1 span { color: #10b981; }
        .sub { text-align:center; color:#94a3b8; margin-bottom:1.5rem; font-size:0.9rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        input { width: 100%; padding: 0.8rem; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; font-size: 1rem; }
        input::placeholder { color: #64748b; }
        .btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 1rem; }
        .link { text-align: center; margin-top: 1rem; color: #94a3b8; font-size:0.9rem; }
        .link a { color: #10b981; text-decoration: none; }
        .success { background: rgba(16,185,129,0.2); border: 1px solid #10b981; border-radius: 8px; padding: 0.75rem; margin-bottom: 1rem; color: #6ee7b7; text-align:center; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>Pet<span>Vet</span> AI</h1>
            <p class="sub">Forgot your password?</p>
            {% if sent %}
            <div class="success">✅ If that email is registered, a reset link is on its way. Check your inbox.</div>
            <p class="link"><a href="/login">← Back to Login</a></p>
            {% else %}
            <form method="POST">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="you@example.com" required>
                </div>
                <button type="submit" class="btn">📧 Send Reset Link</button>
            </form>
            <p class="link"><a href="/login">← Back to Login</a></p>
            {% endif %}
        </div>
    </div>
</body>
</html>
