<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Vet AI - Add Pet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #fff; }
        .container { max-width: 600px; margin: 0 auto; padding: 2rem; }
        h1 { font-size: 2rem; margin-bottom: 1rem; text-align: center; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #94a3b8; }
        .form-group input, .form-group select { width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #fff; font-size: 1rem; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #3b82f6; }
        .species-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
        .species-option { padding: 1rem; border-radius: 12px; border: 2px solid #334155; background: #1e293b; text-align: center; cursor: pointer; transition: all 0.3s; }
        .species-option:hover { border-color: #3b82f6; }
        .species-option.selected { border-color: #3b82f6; background: #3b82f6; }
        .species-option .emoji { font-size: 2rem; }
        .species-option .label { font-size: 0.8rem; margin-top: 0.5rem; }
        .btn { width: 100%; padding: 1rem; border-radius: 12px; border: none; font-size: 1rem; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-primary:hover { background: #2563eb; }
        .btn-secondary { background: transparent; color: #64748b; margin-top: 1rem; }
        .back-link { display: block; text-align: center; margin-top: 1rem; color: #3b82f6; text-decoration: none; }
    </style>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
    :root{--brand:#6366f1;--brand-dark:#4f46e5;--brand-light:#818cf8;--gray-900:#0f172a;--gray-800:#1e293b;--gray-700:#334155;--gray-500:#64748b;--gray-400:#94a3b8;--gray-200:#e2e8f0;--gray-50:#f8fafc;--success:#10b981;--danger:#ef4444;--shadow:0 4px 6px -1px rgba(0,0,0,0.07);--shadow-md:0 10px 15px -3px rgba(0,0,0,0.08);--radius:10px;--radius-lg:16px;--transition:all 0.2s cubic-bezier(0.4,0,0.2,1);}
    *{box-sizing:border-box;}
    body{font-family:'Inter',-apple-system,sans-serif!important;-webkit-font-smoothing:antialiased;background:var(--gray-50)!important;color:var(--gray-800)!important;}
    header,nav.nav{background:var(--gray-900)!important;border-bottom:1px solid rgba(255,255,255,.06)!important;}
    .sidebar,.nav-sidebar{background:var(--gray-900)!important;border-right:1px solid rgba(255,255,255,.06)!important;}
    .sidebar a,.nav-sidebar a{color:var(--gray-400)!important;border-radius:6px!important;margin:1px 8px!important;transition:var(--transition)!important;font-size:0.875rem!important;font-weight:500!important;}
    .sidebar a:hover,.nav-sidebar a:hover{background:rgba(255,255,255,.07)!important;color:#fff!important;}
    .sidebar a.active,.nav-sidebar a.active{background:rgba(99,102,241,.15)!important;color:var(--brand-light)!important;border-left:3px solid var(--brand)!important;}
    .card,.stat-card{border-radius:var(--radius-lg)!important;border:1px solid var(--gray-200)!important;box-shadow:var(--shadow)!important;transition:var(--transition)!important;}
    .card:hover,.stat-card:hover{box-shadow:var(--shadow-md)!important;transform:translateY(-2px)!important;}
    .btn-primary,.btn[type=submit]{background:var(--brand)!important;border-color:var(--brand)!important;border-radius:var(--radius)!important;font-weight:600!important;}
    .btn-primary:hover{background:var(--brand-dark)!important;border-color:var(--brand-dark)!important;box-shadow:0 4px 12px rgba(99,102,241,.35)!important;}
    .btn{border-radius:var(--radius)!important;font-weight:600!important;font-family:inherit!important;}
    input,select,textarea{border-radius:6px!important;border:1.5px solid var(--gray-200)!important;font-family:inherit!important;}
    input:focus,select:focus,textarea:focus{border-color:var(--brand)!important;box-shadow:0 0 0 3px rgba(99,102,241,.1)!important;outline:none!important;}
    h1,h2,h3{letter-spacing:-0.02em!important;}
    </style>
</head>
<body>
<!-- ── Pet Vet AI Global Navbar ── -->
<style>
#pv-nav{background:#0a1628;border-bottom:1px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:9000;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:56px;font-family:'Segoe UI',system-ui,sans-serif;}
#pv-nav .pv-brand{font-size:1.1rem;font-weight:800;color:#10b981;text-decoration:none;white-space:nowrap;letter-spacing:-0.5px;}
#pv-nav .pv-brand span{color:#fff;font-weight:400;}
#pv-nav .pv-links{display:flex;align-items:center;gap:4px;}
#pv-nav .pv-links a{color:#94a3b8;text-decoration:none;padding:6px 12px;border-radius:7px;font-size:0.83rem;font-weight:500;transition:all 0.15s;white-space:nowrap;}
#pv-nav .pv-links a:hover{background:rgba(255,255,255,0.08);color:#fff;}
#pv-nav .pv-links a.pv-active{background:rgba(16,185,129,0.15);color:#10b981;}
#pv-nav .pv-cta{background:#10b981;color:#fff;padding:6px 14px;border-radius:7px;font-size:0.82rem;font-weight:700;text-decoration:none;white-space:nowrap;transition:background 0.15s;}
#pv-nav .pv-cta:hover{background:#059669;color:#fff;}
#pv-nav .pv-hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px;}
#pv-nav .pv-hamburger span{display:block;width:22px;height:2px;background:#94a3b8;border-radius:2px;}
@media(max-width:640px){
  #pv-nav .pv-links{display:none;position:fixed;top:56px;left:0;right:0;background:#0a1628;border-bottom:1px solid rgba(255,255,255,0.08);flex-direction:column;padding:0.5rem 0;gap:0;z-index:8999;}
  #pv-nav .pv-links.open{display:flex;}
  #pv-nav .pv-links a{padding:12px 1.5rem;border-radius:0;font-size:0.9rem;}
  #pv-nav .pv-hamburger{display:flex;}
  #pv-nav .pv-cta{display:none;}
}
</style>
<nav id="pv-nav">
  <a href="/" class="pv-brand">🐾 Pet Vet <span>AI</span></a>
  <div class="pv-links" id="pvLinks">
    {% if session.get('user_id') %}
    <a href="/pets" id="pv-link-pets">🐶 My Pets</a>
    <a href="/diagnose" id="pv-link-diagnose">🔬 Diagnose</a>
    <a href="/vets" id="pv-link-vets">🏥 Find a Vet</a>
    <a href="/profile" id="pv-link-profile">👤 Profile</a>
    <a href="/my-settings" id="pv-link-settings">⚙️ Settings</a>
    <a href="/logout" style="color:#ef4444;">🚪 Logout</a>
    {% else %}
    <a href="/" id="pv-link-home">Home</a>
    <a href="/login" id="pv-link-login">Login</a>
    <a href="/register" class="pv-cta">Start Free Trial</a>
    {% endif %}
  </div>
  <button class="pv-hamburger" onclick="document.getElementById('pvLinks').classList.toggle('open')">
    <span></span><span></span><span></span>
  </button>
</nav>
<script>
// Highlight active nav link based on current path
(function(){
  var path = window.location.pathname;
  var map = {'/pets':'pv-link-pets','/diagnose':'pv-link-diagnose','/vets':'pv-link-vets','/profile':'pv-link-profile','/my-settings':'pv-link-settings','/login':'pv-link-login','/':'pv-link-home'};
  var id = map[path];
  if(id){ var el=document.getElementById(id); if(el) el.classList.add('pv-active'); }
})();
</script>
<!-- ── end navbar ── -->

    <div class="container">
        <h1>➕ Add New Pet</h1>
        
        <form id="addPetForm">
            <div class="form-group">
                <label>Pet Type</label>
                <div class="species-grid">
                    <div class="species-option selected" onclick="selectSpecies('dog', this)">
                        <div class="emoji">🐕</div>
                        <div class="label">Dog</div>
                    </div>
                    <div class="species-option" onclick="selectSpecies('cat', this)">
                        <div class="emoji">🐈</div>
                        <div class="label">Cat</div>
                    </div>
                    <div class="species-option" onclick="selectSpecies('bird', this)">
                        <div class="emoji">🦜</div>
                        <div class="label">Bird</div>
                    </div>
                    <div class="species-option" onclick="selectSpecies('other', this)">
                        <div class="emoji">🐾</div>
                        <div class="label">Other</div>
                    </div>
                </div>
                <input type="hidden" id="species" value="dog">
            </div>
            
            <div class="form-group">
                <label for="name">Pet Name</label>
                <input type="text" id="name" placeholder="e.g., Max" required>
            </div>
            
            <div class="form-group">
                <label for="breed">Breed</label>
                <input type="text" id="breed" placeholder="e.g., Golden Retriever">
            </div>
            
            <div class="form-group">
                <label for="age">Age (years)</label>
                <input type="number" id="age" placeholder="e.g., 3" min="0" max="30">
            </div>
            
            <div class="form-group">
                <label for="weight">Weight (lbs)</label>
                <input type="number" id="weight" placeholder="e.g., 65" min="0">
            </div>
            
            <div class="form-group">
                <label for="notes">Special Notes</label>
                <input type="text" id="notes" placeholder="Allergies, medications, etc.">
            </div>
            
            <button type="submit" class="btn btn-primary">Save Pet</button>
            <a href="/pets" class="back-link">← Back to My Pets</a>
        </form>
    </div>
    
    <script>
        function selectSpecies(species, el) {
            document.querySelectorAll('.species-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('species').value = species;
        }
        
        document.getElementById('addPetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type=submit]');
            btn.disabled = true;
            btn.textContent = 'Saving...';
            const payload = {
                name:    document.getElementById('name').value.trim(),
                species: document.getElementById('species').value,
                breed:   document.getElementById('breed').value.trim(),
                age:     document.getElementById('age').value,
                weight:  document.getElementById('weight') ? document.getElementById('weight').value : '',
                notes:   document.getElementById('notes') ? document.getElementById('notes').value.trim() : '',
            };
            if (!payload.name) {
                alert('Please enter a name for your pet.');
                btn.disabled = false;
                btn.textContent = 'Save Pet';
                return;
            }
            try {
                const res = await fetch('/api/pets', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (res.ok && data.ok) {
                    window.location.href = '/pets?saved=' + encodeURIComponent(payload.name);
                } else {
                    alert('Error: ' + (data.error || 'Could not save pet. Please try again.'));
                    btn.disabled = false;
                    btn.textContent = 'Save Pet';
                }
            } catch(err) {
                alert('Connection error. Please try again.');
                btn.disabled = false;
                btn.textContent = 'Save Pet';
            }
        });
    </script>
</body>
</html>
